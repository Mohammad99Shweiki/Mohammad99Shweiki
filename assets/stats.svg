<svg width="840" height="232" viewBox="0 0 840 232" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Ubuntu,Helvetica,Arial,sans-serif">
  <style>
    .lbl{fill:#a9b1d6;font-size:15px}
    .val{fill:#c0caf5;font-size:15px;font-weight:700}
    .title{fill:#7aa2f7;font-size:17px;font-weight:700}
    .meta{fill:#787c99;font-size:12px} .metab{fill:#c0caf5;font-weight:700}
    .row{opacity:1;animation:enter .7s ease}
    @keyframes enter{from{opacity:0}to{opacity:1}}
    .blink{animation:blink 1.6s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}
    .flame{transform-origin:center bottom;animation:flick 1.6s ease-in-out infinite}
    @keyframes flick{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.16) rotate(3deg)}}
    .num{animation:nglow 1.6s ease-in-out infinite}
    @keyframes nglow{0%,100%{opacity:.82}50%{opacity:1}}
    .gring{transform-origin:709px 120px;animation:spin 6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .draw{stroke-dasharray:383;animation:draw 1.4s ease .2s}
    @keyframes draw{from{stroke-dashoffset:383}}
    .shimmer{animation:sh 3s linear infinite}
    @keyframes sh{from{transform:translateX(-840px)}to{transform:translateX(840px)}}
  </style>
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7aa2f7" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#7aa2f7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff9e64" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ff9e64" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="card"><rect x="1" y="1" width="838" height="230" rx="15"/></clipPath>
  </defs>
  <rect x="1" y="1" width="838" height="230" rx="15" fill="#161a26" stroke="#232842" stroke-width="1.5"/>
  <g clip-path="url(#card)"><rect class="shimmer" x="0" y="0" width="260" height="232" fill="url(#sg)" opacity="0.5"/></g>

  <circle class="blink" cx="44" cy="46" r="5" fill="#7aa2f7"/>
  <text x="60" y="51" class="title">GitHub Stats</text>
  
    <g class="row" style="animation-delay:0.00s" transform="translate(0 86)">
      <g transform="translate(22 -4)"><path d="M0 -7 L2 -2 L7 -2 L3 1 L4 6 L0 3 L-4 6 L-3 1 L-7 -2 L-2 -2 Z" fill="#bb9af7"/></g>
      <text x="46" y="0" class="lbl">Total Stars Earned</text>
      <text x="430" y="0" class="val" text-anchor="end">2</text>
    </g>
    <g class="row" style="animation-delay:0.09s" transform="translate(0 120)">
      <g transform="translate(22 -4)"><circle r="3" fill="none" stroke="#bb9af7" stroke-width="2"/><path d="M-7 0 H-3 M3 0 H7" stroke="#bb9af7" stroke-width="2"/></g>
      <text x="46" y="0" class="lbl">Commits (last year)</text>
      <text x="430" y="0" class="val" text-anchor="end">856</text>
    </g>
    <g class="row" style="animation-delay:0.18s" transform="translate(0 154)">
      <g transform="translate(22 -4)"><circle cx="-5" cy="-4" r="2.3" fill="none" stroke="#bb9af7" stroke-width="1.8"/><circle cx="-5" cy="4" r="2.3" fill="none" stroke="#bb9af7" stroke-width="1.8"/><circle cx="5" cy="4" r="2.3" fill="none" stroke="#bb9af7" stroke-width="1.8"/><path d="M-5 -2 V2 M-5 2 H5 V2" fill="none" stroke="#bb9af7" stroke-width="1.8"/></g>
      <text x="46" y="0" class="lbl">Pull Requests</text>
      <text x="430" y="0" class="val" text-anchor="end">305</text>
    </g>
    <g class="row" style="animation-delay:0.27s" transform="translate(0 188)">
      <g transform="translate(22 -4)"><circle r="6.5" fill="none" stroke="#bb9af7" stroke-width="1.8"/><path d="M0 0 L0 -6.5 A6.5 6.5 0 0 1 5 4" fill="none" stroke="#bb9af7" stroke-width="1.8"/></g>
      <text x="46" y="0" class="lbl">Contributed to</text>
      <text x="430" y="0" class="val" text-anchor="end">9</text>
    </g>

  <line x1="520" y1="40" x2="520" y2="192" stroke="#232842"/>

  <!-- streak ring -->
  <circle class="gring" cx="709" cy="120" r="74" fill="url(#glow)"/>
  <circle cx="709" cy="120" r="61" fill="none" stroke="#222638" stroke-width="9"/>
  <circle class="draw" cx="709" cy="120" r="61" fill="none" stroke="#ff9e64" stroke-width="9"
          stroke-linecap="round" stroke-dashoffset="293.8" transform="rotate(-90 709 120)"/>
  <g class="flame" transform="translate(709 92)">
    <path d="M0 -12 C6 -6 9 -2 9 4 C9 11 4 15 0 15 C-4 15 -9 11 -9 4 C-9 -1 -5 -3 -3 -7 C-2 -3 0 -3 0 -6 Z" fill="#ff9e64"/>
    <path d="M0 -2 C3 1 4 3 4 6 C4 9 2 11 0 11 C-2 11 -4 9 -4 6 C-4 3 -2 2 -1 -1 Z" fill="#f7768e"/>
  </g>
  <text class="num" x="709" y="135" text-anchor="middle" fill="#ff9e64" font-size="40" font-weight="800">7</text>
  <text x="709" y="152" text-anchor="middle" fill="#787c99" font-size="10" letter-spacing="1.5">DAY STREAK</text>
  <text x="709" y="212" text-anchor="middle" class="meta">Total <tspan class="metab">1430</tspan>  ·  Longest <tspan class="metab">7</tspan></text>
</svg>